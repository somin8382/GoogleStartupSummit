<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Startup Alumni Summit with Google DeepMind</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;700;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0f1115;
            --bg-panel: #1c1f26;
            --google-blue: #4285F4;
            --google-red: #EA4335;
            --google-yellow: #FBBC04;
            --google-green: #34A853;
            --accent-gold: #c9a227;
            --text-cream: #f5f0e8;
            --text-dim: #9ca3af;
            --border-subtle: rgba(255, 255, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Noto Serif KR', serif;
            background: var(--bg-dark);
            color: var(--text-cream);
            min-height: 100vh;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
        }

        .ambient {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            background:
                radial-gradient(circle at 15% 15%, rgba(66, 133, 244, 0.08) 0%, transparent 40%),
                radial-gradient(circle at 85% 15%, rgba(234, 67, 53, 0.08) 0%, transparent 40%),
                radial-gradient(circle at 50% 85%, rgba(52, 168, 83, 0.04) 0%, transparent 45%);
            z-index: 0;
        }

        header {
            position: relative; z-index: 10; padding: 1.2rem; text-align: center;
            border-bottom: 4px solid;
            border-image: linear-gradient(to right, var(--google-blue), var(--google-red), var(--google-yellow), var(--google-green)) 1;
            background: var(--bg-panel);
        }

        .game-title {
            font-size: 1.3rem; font-weight: 900; letter-spacing: 0.05em;
            color: #fff; line-height: 1.4;
        }
        .game-title span { color: var(--google-blue); font-size: 0.9rem; display: block; opacity: 0.9; margin-top: 3px; }

        .status-bar {
            display: flex; justify-content: center; gap: 2rem; padding: 0.7rem;
            background: #14171d; border-bottom: 1px solid var(--border-subtle);
            position: relative; z-index: 10;
        }
        .status-item { text-align: center; }
        .status-label { font-size: 0.6rem; color: var(--text-dim); text-transform: uppercase; margin-bottom: 2px; }
        .status-value { font-family: 'JetBrains Mono', monospace; font-size: 1rem; color: var(--google-blue); }

        .game-container {
            position: relative; z-index: 10;
            max-width: 1100px; width: 100%;
            margin: 0 auto; padding: 1rem;
            flex-grow: 1; display: flex; flex-direction: column;
        }

        /* --- Room View --- */
        .room-view {
            position: relative; width: 100%; aspect-ratio: 16/9;
            max-height: 55vh; background: #12151c;
            border: 4px solid #2d333d; border-radius: 20px;
            overflow: hidden; box-shadow: 0 30px 60px rgba(0,0,0,0.8);
            margin-bottom: 0.8rem;
        }

        .room-wall {
            position: absolute; inset: 0;
            background: linear-gradient(180deg, #1a1e26 0%, #0f1218 100%);
        }

        .window {
            position: absolute; top: 8%; right: 12%; width: 18%; height: 22%;
            background: linear-gradient(180deg, #87CEEB 0%, #c9e8f5 60%, #E8F5E9 100%);
            border: 6px solid #2d333d; border-radius: 4px; overflow: hidden;
        }
        .mountain {
            position: absolute; bottom: 0; width: 100%; height: 55%;
            background: linear-gradient(180deg, #4CAF50 0%, #2E7D32 100%);
            clip-path: polygon(0% 100%, 20% 40%, 40% 65%, 60% 20%, 80% 50%, 100% 100%);
        }
        /* Sun inside window */
        .sun {
            position: absolute; top: 12%; right: 15%;
            width: 18%; height: 25%;
            background: radial-gradient(circle, #FFE082, #FFCA28);
            border-radius: 50%;
            box-shadow: 0 0 8px 3px rgba(255, 202, 40, 0.5);
        }

        .room-floor {
            position: absolute; bottom: 0; width: 100%; height: 22%;
            background: #1c222b; border-top: 2px solid #2d333d;
            background-image: repeating-linear-gradient(90deg, #242a35 0px, #242a35 1px, transparent 1px, transparent 50px);
        }

        /* ===== ANIMATIONS ===== */

        /* Float: gentle vertical bob */
        @keyframes float {
            0%   { transform: translateY(0px); }
            30%  { transform: translateY(-8px); }
            60%  { transform: translateY(-4px); }
            100% { transform: translateY(0px); }
        }

        /* Wheel spin */
        @keyframes rotate-wheel {
            from { transform: rotate(0deg); }
            to   { transform: rotate(360deg); }
        }

        /* Cloud drifts left→right */
        @keyframes cloud-drift {
            0%   { left: -12%; opacity: 0; }
            8%   { opacity: 0.75; }
            92%  { opacity: 0.75; }
            100% { left: 112%; opacity: 0; }
        }

        /* Subtle bar chart pulse */
        @keyframes bar-grow {
            0%, 100% { transform: scaleY(1);   opacity: 0.8; }
            50%       { transform: scaleY(1.25); opacity: 1;   }
        }

        /* Auth screen idle glow */
        @keyframes auth-idle {
            0%, 100% { box-shadow: 0 0 20px rgba(66,133,244,0.15); }
            50%       { box-shadow: 0 0 40px rgba(66,133,244,0.35); }
        }

        /* ===== DECO & OBJECTS ===== */
        .deco { position: absolute; pointer-events: none; z-index: 25; }

        /* Cloud */
        .cloud-deco {
            position: absolute;
            top: 10%;
            left: -12%;
            width: 70px;
            pointer-events: none;
            z-index: 26;
            animation: cloud-drift 18s linear infinite;
        }
        .cloud-deco:nth-child(2) { top: 18%; animation-delay: 9s; width: 50px; }

        /* Bike: the container just sits; wheels rotate inside */
        .bike-wheel-rear {
            transform-box: fill-box;
            transform-origin: center;
            animation: rotate-wheel 2.8s linear infinite;
        }
        .bike-wheel-front {
            transform-box: fill-box;
            transform-origin: center;
            animation: rotate-wheel 2.8s linear infinite;
        }

        /* Android floats */
        .android-anim {
            animation: float 3.2s ease-in-out infinite;
        }

        /* Clickable objects */
        .object {
            position: absolute;
            cursor: pointer;
            transition: filter 0.35s ease, transform 0.35s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 40;
        }
        .object:hover {
            filter: brightness(1.25) drop-shadow(0 0 12px rgba(255,255,255,0.25));
            transform: scale(1.06);
        }
        .object.solved::after {
            content: '✓';
            position: absolute;
            top: -10px; right: -10px;
            background: var(--google-green); color: #fff;
            width: 26px; height: 26px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-weight: bold; border: 2px solid #fff;
            box-shadow: 0 5px 10px rgba(0,0,0,0.5);
            z-index: 50;
        }

        /* Object positions */
        .obj-garage { left: 8%;  top: 14%; width: 13%; }
        .obj-table  { left: 32%; bottom: 8%; width: 32%; height: 18%; }
        .obj-desk   { right: 10%; bottom: 10%; width: 20%; height: 16%; }

        /* Auth panel (layer 4) */
        .obj-auth {
            left: 37%; top: 10%; width: 24%; height: 34%;
            background: #050505;
            border: 8px solid #1c222b;
            border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 0 40px rgba(0,0,0,0.9);
            animation: auth-idle 3s ease-in-out infinite;
        }
        .auth-label {
            font-size: 1.1rem; font-weight: 900;
            color: #161a21;
            transition: color 0.6s, text-shadow 0.6s;
            text-align: center; line-height: 1.3;
        }
        .obj-auth.ready {
            border-color: var(--google-green);
            cursor: pointer;
        }
        .obj-auth.ready .auth-label {
            color: #fff;
            text-shadow: 0 0 18px var(--google-green);
        }

        /* Bar chart transform origin fix */
        .bar { transform-origin: bottom center; }

        /* ===== UI PANELS ===== */
        .inventory {
            background: var(--bg-panel); border-radius: 16px;
            border: 1px solid var(--border-subtle);
            padding: 0.8rem; margin-bottom: 0.8rem;
            border-left: 5px solid var(--google-blue);
        }
        .inv-title { font-size: 0.65rem; color: var(--text-dim); text-align: center; margin-bottom: 0.6rem; letter-spacing: 2px; font-weight: bold; }
        .inv-grid { display: flex; gap: 0.8rem; justify-content: center; }
        .inv-slot {
            width: 50px; height: 50px;
            background: #13161d;
            border: 2px dashed #2d333d;
            border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
        }
        .inv-slot.filled { border-style: solid; border-color: var(--google-yellow); background: rgba(251,188,4,0.05); }

        .log {
            background: var(--bg-panel); border: 1px solid var(--border-subtle);
            border-radius: 16px; padding: 1rem;
            height: 100px; overflow-y: auto;
            font-size: 0.85rem; border-left: 5px solid var(--google-red);
        }
        .msg { padding: 0.3rem 0; border-bottom: 1px solid rgba(255,255,255,0.02); color: var(--text-dim); }
        .msg.success   { color: var(--google-green); font-weight: bold; }
        .msg.important { color: var(--google-yellow); font-weight: bold; }

        /* ===== MODALS ===== */
        .modal {
            display: none; position: fixed; top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.97);
            z-index: 2000;
            align-items: center; justify-content: center;
        }
        .modal.active { display: flex; }
        .panel {
            background: var(--bg-panel); padding: 2.2rem;
            border-radius: 28px; border: 2px solid var(--border-subtle);
            width: 94%; max-width: 480px; position: relative;
            text-align: center; box-shadow: 0 40px 80px rgba(0,0,0,0.9);
        }
        .panel::before {
            content: ''; position: absolute;
            top: -2px; left: -2px; right: -2px; height: 8px;
            background: linear-gradient(to right, var(--google-blue), var(--google-red), var(--google-yellow), var(--google-green));
            border-radius: 28px 28px 0 0;
        }
        .close-x {
            position: absolute; top: 20px; right: 25px;
            background: none; border: none; color: #fff;
            font-size: 2rem; cursor: pointer; opacity: 0.3; transition: 0.3s;
        }
        .close-x:hover { opacity: 1; }

        .m-box { background: #13161d; border: 1px solid #2d333d; border-radius: 18px; padding: 1.5rem; margin-bottom: 1rem; text-align: left; }
        .m-label { font-size: 0.7rem; color: var(--google-blue); font-weight: bold; margin-bottom: 6px; text-transform: uppercase; }
        .input { width: 100%; padding: 0.8rem; background: #080a0d; border: 2px solid #2d333d; color: #fff; font-size: 1.1rem; border-radius: 12px; outline: none; }
        .input:focus { border-color: var(--google-blue); }
        .go-btn { width: 100%; padding: 1rem; background: var(--google-blue); color: #fff; border: none; border-radius: 14px; font-size: 1rem; font-weight: bold; cursor: pointer; transition: filter 0.2s; }
        .go-btn:hover { filter: brightness(1.15); }

        /* ===== VICTORY ===== */
        .victory {
            display: none; position: fixed; top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(10,12,16,0.99);
            z-index: 5000;
            align-items: center; justify-content: center;
            flex-direction: column; text-align: center; padding: 2rem;
        }
        .victory.active { display: flex; }
        .v-card {
            background: white; color: #111;
            padding: 2.5rem; border-radius: 40px;
            max-width: 600px; width: 95%;
            box-shadow: 0 50px 100px rgba(0,0,0,0.7);
            position: relative; overflow: hidden;
        }
        .v-card::after {
            content: ''; position: absolute; top: 0; left: 0;
            width: 100%; height: 10px;
            background: linear-gradient(to right, var(--google-blue), var(--google-red), var(--google-yellow), var(--google-green));
        }
        .cookie-gift {
            width: 150px; height: 150px; margin: 0 auto 1.2rem;
            filter: drop-shadow(0 10px 20px rgba(0,0,0,0.2));
            animation: float 3s infinite ease-in-out;
        }
        #confetti-canvas { position: fixed; inset: 0; z-index: 4999; pointer-events: none; }

        /* ===== HINT ===== */
        .hint-toggle {
            position: fixed; bottom: 30px; right: 30px;
            width: 55px; height: 55px;
            background: var(--bg-panel); border: 2px solid var(--google-yellow);
            border-radius: 50%; color: var(--google-yellow);
            font-size: 1.8rem; cursor: pointer;
            z-index: 100; display: flex; align-items: center; justify-content: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.6);
        }
        .hint-pop {
            display: none; position: fixed; bottom: 95px; right: 30px;
            background: var(--bg-panel); border: 1px solid var(--google-yellow);
            border-radius: 24px; padding: 1.5rem; max-width: 300px;
            z-index: 100; box-shadow: 0 30px 60px rgba(0,0,0,0.9); text-align: center;
        }
        .hint-pop.active { display: block; }

        @media (max-width: 768px) {
            .room-view { max-height: 32vh; }
            .v-card { padding: 1.5rem; }
        }
    </style>
</head>
<body>
    <div class="ambient"></div>
    <canvas id="confetti-canvas"></canvas>

    <header>
        <h1 class="game-title">Google for Startups' ROOM<span>Alumni Summit with Google DeepMind</span></h1>
    </header>

    <div class="status-bar">
        <div class="status-item"><div class="status-label">STEPS</div><div class="status-value"><span id="solved-count">0</span>/4</div></div>
        <div class="status-item"><div class="status-label">TIME</div><div class="status-value" id="timer">00:00</div></div>
        <div class="status-item"><div class="status-label">HINTS</div><div class="status-value" id="hints-used">0</div></div>
    </div>

    <main class="game-container">
        <div class="room-view">
            <div class="room-wall"></div>

            <!-- Window with sky & mountains -->
            <div class="window">
                <div class="sun"></div>
                <div class="mountain"></div>
            </div>

            <!-- Floor -->
            <div class="room-floor"></div>

            <!-- ═══ DECO: Clouds (simple ellipse-based shapes) ═══ -->
            <svg class="cloud-deco" viewBox="0 0 90 55" xmlns="http://www.w3.org/2000/svg">
                <ellipse cx="45" cy="42" rx="40" ry="13" fill="white"/>
                <ellipse cx="28" cy="34" rx="20" ry="15" fill="white"/>
                <ellipse cx="52" cy="30" rx="24" ry="18" fill="white"/>
                <ellipse cx="40" cy="25" rx="16" ry="13" fill="white"/>
            </svg>
            <svg class="cloud-deco" viewBox="0 0 70 42" xmlns="http://www.w3.org/2000/svg" style="animation-delay: 9s; width: 52px;">
                <ellipse cx="35" cy="32" rx="30" ry="10" fill="white"/>
                <ellipse cx="22" cy="25" rx="15" ry="11" fill="white"/>
                <ellipse cx="40" cy="22" rx="18" ry="13" fill="white"/>
                <ellipse cx="30" cy="18" rx="12" ry="10" fill="white"/>
            </svg>

            <!-- ═══ DECO: Google Bike (wheels have spokes → rotation is visible) ═══ -->
            <div class="deco" style="bottom: 4%; left: 2%; width: 95px;">
                <svg viewBox="0 0 105 65" xmlns="http://www.w3.org/2000/svg">
                    <!-- Rear wheel centered at (20,45) -->
                    <g class="bike-wheel-rear" transform="translate(20,45)">
                        <circle cx="0" cy="0" r="16" fill="none" stroke="var(--google-red)" stroke-width="2"/>
                        <line x1="0" y1="-16" x2="0"   y2="16"  stroke="var(--google-red)" stroke-width="1" opacity="0.65"/>
                        <line x1="-16" y1="0" x2="16"  y2="0"   stroke="var(--google-red)" stroke-width="1" opacity="0.65"/>
                        <line x1="-11.3" y1="-11.3" x2="11.3" y2="11.3" stroke="var(--google-red)" stroke-width="1" opacity="0.65"/>
                        <line x1="-11.3" y1="11.3"  x2="11.3" y2="-11.3" stroke="var(--google-red)" stroke-width="1" opacity="0.65"/>
                        <circle cx="0" cy="0" r="3" fill="var(--google-red)"/>
                    </g>
                    <!-- Front wheel centered at (83,45) -->
                    <g class="bike-wheel-front" transform="translate(83,45)">
                        <circle cx="0" cy="0" r="16" fill="none" stroke="var(--google-blue)" stroke-width="2"/>
                        <line x1="0" y1="-16" x2="0"   y2="16"  stroke="var(--google-blue)" stroke-width="1" opacity="0.65"/>
                        <line x1="-16" y1="0" x2="16"  y2="0"   stroke="var(--google-blue)" stroke-width="1" opacity="0.65"/>
                        <line x1="-11.3" y1="-11.3" x2="11.3" y2="11.3" stroke="var(--google-blue)" stroke-width="1" opacity="0.65"/>
                        <line x1="-11.3" y1="11.3"  x2="11.3" y2="-11.3" stroke="var(--google-blue)" stroke-width="1" opacity="0.65"/>
                        <circle cx="0" cy="0" r="3" fill="var(--google-blue)"/>
                    </g>
                    <!-- Frame: bottom bracket → seat tube, chain stay, down tube, top tube, fork -->
                    <path d="M20 45 L50 45 L72 18 M50 45 L42 18 M30 18 L72 18"
                          fill="none" stroke="var(--google-green)" stroke-width="2.5" stroke-linejoin="round"/>
                    <!-- Seat -->
                    <line x1="46" y1="20" x2="56" y2="20" stroke="var(--google-yellow)" stroke-width="3" stroke-linecap="round"/>
                    <line x1="51" y1="20" x2="50" y2="30" stroke="var(--google-yellow)" stroke-width="1.5"/>
                    <!-- Handlebar -->
                    <line x1="71" y1="18" x2="76" y2="12" stroke="var(--google-red)" stroke-width="2.5" stroke-linecap="round"/>
                    <!-- Pedal crank (static) -->
                    <circle cx="50" cy="45" r="3.5" fill="var(--google-yellow)"/>
                </svg>
            </div>

            <!-- ═══ DECO: Android Mascot (floats) ═══ -->
            <div class="deco android-anim" style="bottom: 22%; right: 30%; width: 30px;">
                <svg viewBox="0 0 100 130" xmlns="http://www.w3.org/2000/svg">
                    <!-- Antennae -->
                    <line x1="34" y1="36" x2="22" y2="16" stroke="#A4C639" stroke-width="5" stroke-linecap="round"/>
                    <circle cx="22" cy="14" r="4" fill="#A4C639"/>
                    <line x1="66" y1="36" x2="78" y2="16" stroke="#A4C639" stroke-width="5" stroke-linecap="round"/>
                    <circle cx="78" cy="14" r="4" fill="#A4C639"/>
                    <!-- Head (rounded top) -->
                    <path d="M20 48 Q20 28 50 28 Q80 28 80 48 L80 58 Q80 64 70 64 L30 64 Q20 64 20 58 Z" fill="#A4C639"/>
                    <!-- Eyes -->
                    <circle cx="36" cy="46" r="4.5" fill="white"/>
                    <circle cx="64" cy="46" r="4.5" fill="white"/>
                    <!-- Body -->
                    <rect x="14" y="67" width="72" height="46" rx="9" fill="#A4C639"/>
                    <!-- Chest stripe -->
                    <rect x="30" y="75" width="40" height="3" rx="1.5" fill="rgba(255,255,255,0.25)"/>
                    <!-- Left arm -->
                    <rect x="2"  y="67" width="11" height="36" rx="5.5" fill="#A4C639"/>
                    <!-- Right arm -->
                    <rect x="87" y="67" width="11" height="36" rx="5.5" fill="#A4C639"/>
                    <!-- Left leg -->
                    <rect x="22" y="109" width="20" height="14" rx="6" fill="#A4C639"/>
                    <!-- Right leg -->
                    <rect x="58" y="109" width="20" height="14" rx="6" fill="#A4C639"/>
                </svg>
            </div>

            <!-- ═══ Layer 1: Garage Photo ═══ -->
            <svg class="object obj-garage" id="layer1" onclick="openLayer('layer1')" viewBox="0 0 200 260" xmlns="http://www.w3.org/2000/svg">
                <!-- Photo frame -->
                <rect x="4" y="4"   width="192" height="252" rx="6" fill="#c8a86b"/>
                <rect x="14" y="14" width="172" height="232" rx="4" fill="#1a1a1a"/>
                <!-- Photo interior: simple garage sketch -->
                <rect x="22" y="22" width="156" height="150" rx="3" fill="#2a2e38"/>
                <!-- Garage door -->
                <rect x="50" y="90" width="100" height="80" fill="#3a3f4b" rx="2"/>
                <line x1="50" y1="110" x2="150" y2="110" stroke="#555" stroke-width="1.5"/>
                <line x1="50" y1="130" x2="150" y2="130" stroke="#555" stroke-width="1.5"/>
                <line x1="50" y1="150" x2="150" y2="150" stroke="#555" stroke-width="1.5"/>
                <!-- Roof triangle -->
                <path d="M36 90 L100 45 L164 90 Z" fill="#4a5568"/>
                <!-- Door handle -->
                <circle cx="100" cy="168" r="5" fill="#888"/>
                <!-- Caption -->
                <rect x="14" y="188" width="172" height="46" rx="4" fill="#0a0c10"/>
                <text x="100" y="206" text-anchor="middle" fill="#9ca3af" font-size="9" font-family="'JetBrains Mono', monospace">MENLO PARK, CALIFORNIA</text>
                <text x="100" y="222" text-anchor="middle" fill="#6b7280" font-size="8" font-family="sans-serif">FOUNDATION 1998</text>
            </svg>

            <!-- ═══ Layer 2: Table with Desktop ═══ -->
            <div class="object obj-table" id="layer2" onclick="openLayer('layer2')">
                <!-- Items sitting on the table surface -->
                <div style="position:absolute; bottom:100%; left:0; width:100%; display:flex; justify-content:space-around; align-items:flex-end; padding-bottom:4px;">

                    <!-- Figurine/trophy -->
                    <svg style="width:18px; height:34px; flex-shrink:0;" viewBox="0 0 50 100" xmlns="http://www.w3.org/2000/svg">
                        <ellipse cx="25" cy="18" rx="14" ry="16" fill="#cbd5e1"/>
                        <rect x="12" y="34" width="26" height="50" rx="5" fill="#94a3b8"/>
                        <rect x="6"  y="82" width="38" height="7"  rx="3" fill="#64748b"/>
                    </svg>

                    <!-- Monitor (modern flat screen) -->
                    <svg style="width:90px; height:72px; flex-shrink:0;" viewBox="0 0 130 105" xmlns="http://www.w3.org/2000/svg">
                        <!-- Monitor bezel -->
                        <rect x="5" y="5" width="120" height="74" rx="5" fill="#2a2e35"/>
                        <!-- Screen area -->
                        <rect x="12" y="11" width="106" height="61" rx="3" fill="#0a0c12"/>
                        <!-- Bar chart (animated via inline style) -->
                        <rect class="bar" x="26" y="50" width="11" height="16" fill="var(--google-blue)"
                              style="animation: bar-grow 1.0s ease-in-out infinite alternate;"/>
                        <rect class="bar" x="42" y="38" width="11" height="28" fill="var(--google-red)"
                              style="animation: bar-grow 1.3s ease-in-out infinite alternate;"/>
                        <rect class="bar" x="58" y="26" width="11" height="40" fill="var(--google-yellow)"
                              style="animation: bar-grow 0.9s ease-in-out infinite alternate;"/>
                        <rect class="bar" x="74" y="44" width="11" height="22" fill="var(--google-green)"
                              style="animation: bar-grow 1.5s ease-in-out infinite alternate;"/>
                        <rect class="bar" x="90" y="32" width="11" height="34" fill="var(--google-blue)"
                              style="animation: bar-grow 1.1s ease-in-out infinite alternate;"/>
                        <!-- Monitor neck + base -->
                        <rect x="60" y="79" width="10" height="14" fill="#2a2e35"/>
                        <rect x="42" y="93" width="46" height="4"  rx="2" fill="#1c1f24"/>
                    </svg>

                    <!-- Small whiteboard -->
                    <svg style="width:52px; height:40px; flex-shrink:0;" viewBox="0 0 110 80" xmlns="http://www.w3.org/2000/svg">
                        <rect x="0" y="0" width="110" height="75" rx="3" fill="white" stroke="#4a4a4a" stroke-width="4"/>
                        <!-- Scribbles on board -->
                        <path d="M15 25 Q35 15 55 25 Q75 35 95 20" fill="none" stroke="var(--google-blue)" stroke-width="2.5"/>
                        <line x1="15" y1="50" x2="95" y2="50" stroke="#ccc" stroke-width="1"/>
                        <line x1="15" y1="60" x2="70" y2="60" stroke="#ccc" stroke-width="1"/>
                        <!-- Marker tray -->
                        <rect x="0" y="75" width="110" height="5" rx="1" fill="#888"/>
                    </svg>
                </div>

                <!-- Table surface -->
                <div style="width:100%; height:100%; background:rgba(255,255,255,0.04); border-top:3px solid #4a5568; border-radius:6px;"></div>
            </div>

            <!-- ═══ Layer 3: Desk with Tablet ═══ -->
            <div class="object obj-desk" id="layer3" onclick="openLayer('layer3')">
                <!-- Tablet propped on desk -->
                <div style="position:absolute; bottom:calc(100% - 2px); left:50%; transform:translateX(-50%); width:72px; height:54px;
                            background:#0a0c10; border:3px solid #2d333d; border-radius:8px;
                            overflow:hidden; box-shadow: 0 0 20px rgba(66,133,244,0.35);">
                    <!-- Tablet screen gradient + percentage -->
                    <div style="position:absolute; inset:0;
                                background: linear-gradient(135deg, #1a3a6c, #1a5c3a);
                                display:flex; align-items:center; justify-content:center;
                                flex-direction:column; gap:2px;">
                        <div style="font-family:'JetBrains Mono',monospace; font-size:13px; font-weight:700; color:#fff;
                                    animation: bar-grow 2s ease-in-out infinite alternate;">98%</div>
                        <div style="width:36px; height:3px; border-radius:2px; background:var(--google-green); opacity:0.8;"></div>
                    </div>
                </div>
                <!-- Desk surface -->
                <div style="width:100%; height:100%; background:rgba(255,255,255,0.035); border-top:3px solid #4a5568; border-radius:6px;"></div>
            </div>

            <!-- ═══ Layer 4: Auth Screen ═══ -->
            <div class="obj-auth object" id="layer4" onclick="openLayer('layer4')">
                <div class="auth-label">SUMMIT<br>AUTH</div>
            </div>

        </div><!-- /room-view -->

        <div class="inventory">
            <div class="inv-title">ACCESS CLUES</div>
            <div class="inv-grid">
                <div class="inv-slot" id="slot-1"></div>
                <div class="inv-slot" id="slot-2"></div>
                <div class="inv-slot" id="slot-3"></div>
                <div class="inv-slot" id="slot-4"></div>
            </div>
        </div>

        <div class="log" id="message-log">
            <div class="msg important">Innovation Hub 시스템에 접속했습니다. 4가지 레이어를 해제하고 선물을 받으세요!</div>
        </div>
    </main>

    <!-- Puzzle Modal -->
    <div class="modal" id="puzzle-modal">
        <div class="panel">
            <button class="close-x" onclick="closeModal()">&times;</button>
            <div id="modal-content"></div>
        </div>
    </div>

    <!-- Hint -->
    <button class="hint-toggle" onclick="toggleHintPopup()">?</button>
    <div class="hint-pop" id="hint-popup">
        <p id="hint-text" style="color:var(--text-dim); font-size:0.9rem; margin-bottom:1.4rem;">보안 힌트를 확인하시겠습니까?</p>
        <button id="hint-reveal-btn" class="go-btn" style="background:var(--google-yellow); color:#000;" onclick="revealHint()">힌트 확인하기</button>
    </div>

    <!-- Victory -->
    <div class="victory" id="victory-screen">
        <div class="v-card">
            <div class="cookie-gift">
                <svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
                    <circle cx="100" cy="100" r="85" fill="#8B4513" stroke="#5D2E0A" stroke-width="4"/>
                    <circle cx="70"  cy="65"  r="10" fill="#3D1F00"/>
                    <circle cx="130" cy="85"  r="12" fill="#3D1F00"/>
                    <circle cx="100" cy="135" r="11" fill="#3D1F00"/>
                    <circle cx="150" cy="120" r="9"  fill="#3D1F00"/>
                    <circle cx="55"  cy="125" r="8"  fill="#3D1F00"/>
                </svg>
            </div>
            <h1 style="font-size:2.2rem; font-weight:900; color:#4285F4; margin-bottom:1rem;">MISSION COMPLETE!</h1>
            <p style="font-size:1.15rem; color:#222; margin-bottom:1.5rem; font-weight:600;">
                Google for Startups가 준비한 쫀득한 <strong>'두쫀쿠'</strong>를 획득했습니다!<br>
                <span style="color:#666; font-size:0.95rem; font-weight:400;">혁신의 여정에 함께해 주셔서 감사합니다.</span>
            </p>
            <button class="go-btn" onclick="location.reload()">재시작</button>
        </div>
    </div>

    <script>
        const GAME_DATA = {
            layer1: { step: 1, title: "Layer 1: 이름의 기원", desc: "구글의 이름은 수학 용어로 '10의 100제곱'을 뜻하는 이 단어의 오타에서 유래되었습니다.", missions: [{ id: "m1", label: "ANSWER", q: "원래의 단어를 입력하세요.", ans: ["구골", "googol"], hint: "방대한 정보를 모두 담겠다는 의지가 담긴 숫자 단위입니다. 'G'로 시작해 'L'로 끝납니다." }] },
            layer2: { step: 2, title: "Layer 2: 마스터의 능력", desc: "구성원 개개인의 본질과 잠재력을 읽어내는 리더의 능력을 무엇이라 할까요?", missions: [{ id: "m2", label: "ANSWER", q: "리더의 핵심 능력을 입력하세요.", ans: ["피플 리터러시", "people literacy", "피플리터러시"], hint: "데이터를 읽는 게 데이터 리터러시라면, '사람'의 본질을 읽는 능력은 이것입니다." }] },
            layer3: { step: 3, title: "Layer 3: 스타트업 생존율", desc: "한국 스타트업의 미래는 밝습니다.", missions: [{ id: "m3", label: "ANSWER", q: "구글 엑셀러레이팅 프로그램을 이수한 한국 스타트업의 생존율은 몇 %일까요?", ans: ["98%", "98"], hint: "매우 높은 수치입니다. 두 자리 숫자를 입력하세요." }] },
            layer4: { step: 4, title: "Layer 4: 최종 열쇠", desc: "이 서밋의 메인 파트너를 입력하십시오.", missions: [{ id: "m4", label: "ANSWER", q: "Startup Alumni Summit with [ ] DeepMind.", ans: ["구글", "google"], hint: "현재 Innovation Hub의 주체입니다." }] }
        };

        const state = {
            start: Date.now(),
            solved: { layer1: false, layer2: false, layer3: false, layer4: false },
            hintCount: 0,
            seenHints: new Set(),
            active: null
        };

        function startTimer() {
            setInterval(() => {
                const sec = Math.floor((Date.now() - state.start) / 1000);
                document.getElementById('timer').textContent =
                    String(Math.floor(sec / 60)).padStart(2, '0') + ':' +
                    String(sec % 60).padStart(2, '0');
            }, 1000);
        }

        function addLog(text, type = '') {
            const log = document.getElementById('message-log');
            const d = document.createElement('div');
            d.className = `msg ${type}`;
            d.textContent = text;
            log.insertBefore(d, log.firstChild);
        }

        function openLayer(id) {
            if (id === 'layer4' && !(state.solved.layer1 && state.solved.layer2 && state.solved.layer3)) {
                addLog("ACCESS DENIED: 하위 레이어를 먼저 해제하십시오.");
                return;
            }
            if (state.solved[id]) return;
            state.active = id;
            const data = GAME_DATA[id];
            let html = `<div style="margin-bottom:1.5rem;">
                <div style="font-size:0.7rem; color:var(--google-blue); font-weight:bold; margin-bottom:5px;">LAYER ${data.step}</div>
                <h2 style="font-size:1.4rem; color:#fff; margin-bottom:10px;">${data.title}</h2>
                <p style="color:var(--text-dim); font-size:0.9rem;">${data.desc}</p>
            </div>`;
            data.missions.forEach(m => {
                html += `<div class="m-box">
                    <div class="m-label">${m.label}</div>
                    <div class="m-q" style="color:var(--text-dim); font-size:0.9rem; margin-bottom:10px;">${m.q}</div>
                    <input type="text" id="${m.id}" class="input" placeholder="정답 입력" autocomplete="off">
                </div>`;
            });
            html += `<button class="go-btn" onclick="check()">분석 승인</button>`;
            document.getElementById('modal-content').innerHTML = html;
            document.getElementById('puzzle-modal').classList.add('active');
            // Focus first input
            setTimeout(() => {
                const first = document.querySelector('#modal-content .input');
                if (first) first.focus();
            }, 100);
        }

        function closeModal() {
            document.getElementById('puzzle-modal').classList.remove('active');
            state.active = null;
        }

        function check() {
            const data = GAME_DATA[state.active];
            let allOk = true;
            data.missions.forEach(m => {
                const val = document.getElementById(m.id).value.trim().toLowerCase().replace(/\s/g, '');
                const ok = m.ans.some(a => a.toLowerCase().replace(/\s/g, '') === val);
                if (!ok) allOk = false;
            });

            if (allOk) {
                const id = state.active;
                state.solved[id] = true;
                const count = Object.values(state.solved).filter(v => v).length;
                document.getElementById('solved-count').textContent = count;
                document.getElementById(id).classList.add('solved');

                const slot = document.getElementById(`slot-${count}`);
                slot.classList.add('filled');
                slot.innerHTML = `<svg viewBox="0 0 24 24" fill="var(--google-yellow)" style="width:28px;height:28px;"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>`;

                addLog(`GRANTS ACCESS: ${data.title} 레이어 해제.`, 'success');
                closeModal();

                if (state.solved.layer1 && state.solved.layer2 && state.solved.layer3) {
                    const l4 = document.getElementById('layer4');
                    l4.classList.add('ready');
                    addLog("AUTH READY: 최종 스크린이 활성화되었습니다.", "important");
                }

                if (id === 'layer4') {
                    startConfetti();
                    setTimeout(() => document.getElementById('victory-screen').classList.add('active'), 600);
                }
            } else {
                addLog("AUTH DENIED: 데이터 불일치.", "error");
                // Shake the inputs
                document.querySelectorAll('#modal-content .input').forEach(el => {
                    el.style.borderColor = 'var(--google-red)';
                    setTimeout(() => el.style.borderColor = '#2d333d', 1200);
                });
            }
        }

        // Allow Enter key to submit
        document.addEventListener('keydown', e => {
            if (e.key === 'Enter' && state.active) check();
        });

        function toggleHintPopup() {
            const pop = document.getElementById('hint-popup');
            pop.classList.toggle('active');
            if (pop.classList.contains('active')) {
                document.getElementById('hint-text').textContent = "보안 힌트를 확인하시겠습니까?";
                document.getElementById('hint-reveal-btn').style.display = "block";
            }
        }

        function revealHint() {
            const target = Object.keys(state.solved).find(k => !state.solved[k]);
            if (!target) {
                document.getElementById('hint-text').textContent = "모든 과제가 완료되었습니다.";
                document.getElementById('hint-reveal-btn').style.display = "none";
                return;
            }
            if (!state.seenHints.has(target)) {
                state.hintCount++;
                state.seenHints.add(target);
                document.getElementById('hints-used').textContent = state.hintCount;
            }
            const data = GAME_DATA[target];
            const hintsText = data.missions.map(m => `• ${m.hint}`).join('<br>');
            document.getElementById('hint-text').innerHTML =
                `<div style="text-align:left; color:#fff; font-size:0.85rem; line-height:1.6;">${hintsText}</div>`;
            document.getElementById('hint-reveal-btn').style.display = "none";
        }

        function startConfetti() {
            const canvas = document.getElementById('confetti-canvas');
            const ctx = canvas.getContext('2d');
            canvas.width  = window.innerWidth;
            canvas.height = window.innerHeight;
            const colors = ['#4285F4','#EA4335','#FBBC04','#34A853','#FFFFFF'];
            const pieces = Array.from({ length: 220 }, () => ({
                x:     Math.random() * canvas.width,
                y:     Math.random() * canvas.height - canvas.height,
                size:  Math.random() * 10 + 4,
                color: colors[Math.floor(Math.random() * colors.length)],
                speed: Math.random() * 4 + 2,
                angle: Math.random() * 6.28,
                rot:   (Math.random() - 0.5) * 0.15,
                drift: (Math.random() - 0.5) * 1.5
            }));
            function draw() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                pieces.forEach(p => {
                    ctx.save();
                    ctx.translate(p.x, p.y);
                    ctx.rotate(p.angle);
                    ctx.fillStyle = p.color;
                    ctx.fillRect(-p.size / 2, -p.size / 2, p.size, p.size * 0.6);
                    ctx.restore();
                    p.y     += p.speed;
                    p.x     += p.drift;
                    p.angle += p.rot;
                    if (p.y > canvas.height) { p.y = -20; p.x = Math.random() * canvas.width; }
                });
                requestAnimationFrame(draw);
            }
            draw();
        }

        startTimer();
    </script>
</body>
</html>
